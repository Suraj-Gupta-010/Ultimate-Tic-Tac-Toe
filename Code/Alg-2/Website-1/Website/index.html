<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Super Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet"><meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
<div class="moves">
    <div class="moves-panel">
        <div class="header">
            <div class="cross">✖</div>
            <div class="nought">⬤</div>
        </div>
        <div class="moves-div">
            <div class="moves-grid"></div>
        </div>
    </div>
    <div class="moves-label">✖ MOVES ✖</div>
</div>
<div class="container">
    <div class="wrapper">
        <div class="player-info">
            <div class="credits">
                <p>T</p>
                <p>U</p>
                <p>R</p>
                <p>N</p>
            </div>
            <div class="turn">✖</div>
        </div>
        <div class="big-board">
        </div>
        <div class="win-div">
            <div class="credits">
                <p>W</p>
                <p>I</p>
                <p>N</p>
            </div>
            <div class="winner">?</div>
        </div>
    </div>
    ⬤ ULTIMATE TIC TAC TOE ⬤
</div>

<script src="scripts/minimax.js"></script>
<script src="scripts/grid.js"></script>
<script src="scripts/index.js"></script>
</body>
</html>
